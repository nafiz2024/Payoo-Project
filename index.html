<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Login</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- daisyui CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Custom CSS -->
    <style>
      * {
        font-family: "Outfit", sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
  <body
    class="min-h-screen max-w-screen md:max-w-md bg-base-200 mx-auto flex flex-col items-center justify-center"
  >
    <div class="flex flex-col items-center gap-8">
      <div class="">
        <img src="./assets/Logo-full.png" alt="" />
      </div>
      <div class="">
        <fieldset
          class="fieldset bg-white border-base-300 rounded-box w-[402px] p-8 gap-4"
        >
          <label class="label text-[16px] font-medium text-[#080808]"
            >Mobile Number</label
          >
          <input
            id="mobile_number"
            maxlength="11"
            minlength="11"
            type="email"
            class="input text-[16px] rounded-full p-5 bg-[#F4F5F7] border-none"
            placeholder="Enter your number"
          />

          <label class="label text-[16px] font-medium text-[#080808]"
            >4 Digit Pin</label
          >
          <input
            id="pin"
            maxlength="4"
            minlength="4"
            type="password"
            class="input text-[16px] rounded-full p-5 bg-[#F4F5F7] border-none"
            placeholder="Enter 4 Digit Pin"
          />

          <button id="login_btn" class="btn btn-primary rounded-full">
            Login
          </button>
        </fieldset>
      </div>
    </div>

    <script src="./script/login.js"></script>
  </body>
</html>
