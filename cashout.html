<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Cash Out</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- daisyui CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Custom CSS -->
    <style>
      * {
        font-family: "Outfit", sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-screen md:max-w-md bg-base-200 mx-auto">
    <!-- Home Page Section Start-->
    <section class="bg-white rounded-b-3xl">
      <!-- TobBar Section Start-->
      <section>
        <div class="flex justify-between py-4 px-6">
          <div class="">
            <h1>00:00</h1>
          </div>
          <div class="">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full"></i>
          </div>
        </div>
      </section>
      <!-- Topbar Section End-->

      <!-- Header Section Start -->
      <section class="border-b border-[#080808]/10 sticky top-0 z-10">
        <div class="flex justify-between py-2.5 px-6">
          <div class="flex gap-2">
            <div class="w-[60px]">
              <img src="/assets/logo.png" alt="" />
            </div>
            <div class="gap-1.5">
              <h1 class="text-[18px] font-extrabold text-[#080808]">
                $<span id="balance">45000</span>
              </h1>
              <p class="text-[14px] text-[#080808] opacity-50">
                Available Balance
              </p>
            </div>
          </div>
          <div class="">
            <a href="/index.html">
              <button class="btn">
                <i class="rotate-180 fa-solid fa-arrow-right-from-bracket"></i>
                Logout
              </button>
            </a>
          </div>
        </div>
      </section>
      <!-- Header Section End-->

      <!-- Banner Section Start-->

      <!-- Banner Section End-->

      <!-- Card Section Start-->
      <section>
        <div class="p-6 grid grid-cols-3 gap-4 mb-4">
          <button
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
          >
            <img src="/assets/opt-1.png" alt="" />
            <p>Add Money</p>
          </button>
          <button
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2] focus:bg-[#0874F2]/5 focus:border focus:border-[#0874F2]"
          >
            <img src="/assets/opt-2.png" alt="" />
            <p>Cashout</p>
          </button>
          <button
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
          >
            <img src="/assets/opt-3.png" alt="" />
            <p>Pay Bill</p>
          </button>
          <button
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
          >
            <img src="/assets/opt-4.png" alt="" />
            <p>Transfer Money</p>
          </button>
          <button
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
          >
            <img src="/assets/opt-5.png" alt="" />
            <p>Get Bonus</p>
          </button>
          <button
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
          >
            <img src="/assets/opt-6.png" alt="" />
            <p>Transactions</p>
          </button>
        </div>
      </section>
      <!-- Card Section End-->
    </section>
    <!-- Home Page Section End-->

    <!-- Cashout Section Start-->
    <section>
      <div class="px-6 pb-10">
        <div class="">
          <h1 class="text-[18px] font-semibold text-[#080808] pb-4">
            Cash Out
          </h1>
        </div>
        <div class="">
          <fieldset
            class="fieldset bg-white border-base-300 rounded-3xl w-[402px] p-6 gap-4"
          >
            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Agent Number</label
            >
            <input
              id="agent_number"
              maxlength="11"
              minlength="11"
              type="text"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter 11 digit number"
            />

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Amount</label
            >
            <input
              id="cashout_amount"
              maxlength="11"
              minlength="11"
              type="number"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter amount to withdraw"
            />

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Pin Number</label
            >
            <input
              id="cashout_pin"
              maxlength="11"
              minlength="11"
              type="password"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="cashout_btn"
              class="btn btn-primary rounded-full text-xl text-white font-semibold"
            >
              Withdraw Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>
    <!-- Cashout Section End-->

    <script src="/script/cashout.js"></script>
  </body>
</html>
