<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- daisyui CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Custom CSS -->
    <style>
      * {
        font-family: "Outfit", sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-screen md:max-w-md bg-base-200 mx-auto">
    <!-- Home Page Section Start-->
    <section class="">
      <!-- TobBar Section Start-->
      <section>
        <div class="flex justify-between py-4 px-6">
          <div class="">
            <h1>00:00</h1>
          </div>
          <div class="">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full"></i>
          </div>
        </div>
      </section>
      <!-- Topbar Section End-->

      <!-- Header Section Start -->
      <section
        class="border-b border-[#080808]/10 sticky bg-base-200 top-0 z-10"
      >
        <div class="flex justify-between py-2.5 px-6">
          <div class="flex gap-2">
            <div class="w-[60px]">
              <img src="./assets/Logo.png" alt="" />
            </div>
            <div class="gap-1.5">
              <h1 class="text-[18px] font-extrabold text-[#080808]">
                $<span id="balance">45000</span>
              </h1>
              <p class="text-[14px] text-[#080808] opacity-50">
                Available Balance
              </p>
            </div>
          </div>
          <div class="">
            <a href="/index.html">
              <button class="btn">
                <i class="rotate-180 fa-solid fa-arrow-right-from-bracket"></i>
                Logout
              </button>
            </a>
          </div>
        </div>
      </section>
      <!-- Header Section End-->

      <!-- Banner Section Start-->
      <section>
        <div class="px-6 pt-8 pb-6">
          <h1 class="text-2xl font-bold leading-8 text-[#080808] pb-3">
            Welcome to Pay<span class="text-[#7460FF]">oo</span>
          </h1>
          <p class="leading-7 text-[#080808] opacity-50">
            Enjoy easy and convenient financial services with us. Cashout charge
            is low and
          </p>
        </div>
      </section>
      <!-- Banner Section End-->

      <!-- Card Section Start-->
      <section>
        <div class="p-6 grid grid-cols-3 gap-4 mb-4">
          <button
            onclick="showOnly('add_money')"
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
          >
            <img src="./assets/opt-1.png" alt="" />
            <p>Add Money</p>
          </button>
          <button
            onclick="showOnly('cashout')"
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
          >
            <img src="./assets/opt-2.png" alt="" />
            <p>CashOut</p>
          </button>
          <button
            onclick="showOnly('pay_bill')"
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
          >
            <img src="./assets/opt-5.png" alt="" />
            <p>Pay Bill</p>
          </button>
          <button
            onclick="showOnly('transfer_money')"
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
          >
            <img src="./assets/opt-3.png" alt="" />
            <p>Transfer Money</p>
          </button>
          <button
            onclick="showOnly('bonus')"
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
          >
            <img src="./assets/opt-4.png" alt="" />
            <p>Get Bonus</p>
          </button>

          <button
            onclick="showOnly('transactions_history')"
            class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
          >
            <img src="./assets/opt-6.png" alt="" />
            <p>Transactions</p>
          </button>
        </div>
      </section>
      <!-- Card Section End-->
    </section>
    <!-- Home Page Section End-->

    <!-- Add Money Section Start-->
    <section id="add_money" class="">
      <div class="px-6 pb-10">
        <div class="">
          <h1 class="text-[18px] font-semibold text-[#080808] pb-4">
            Add Money
          </h1>
        </div>
        <div class="">
          <fieldset
            class="fieldset bg-white border-base-300 rounded-3xl w-[402px] p-6 gap-4"
          >
            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Select A Bank</label
            >
            <select
              id="add_money_bank"
              class="select text-[16px] font-light text-[#080808]/50 rounded-full px-5 bg-[#F4F5F7] border-none w-full"
            >
              <option disabled selected>Select A Bank</option>
              <option>DBBL</option>
              <option>UCB</option>
              <option>MTB</option>
            </select>

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Bank Account Number</label
            >
            <input
              id="bank_account_number"
              maxlength="11"
              minlength="11"
              type="text"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter 11 digit account number"
            />

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Amount to Add</label
            >
            <input
              id="add_money_amount"
              type="number"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Add Amount to withdraw"
            />

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Pin Number</label
            >
            <input
              id="add_money_pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="add_money_btn"
              class="btn btn-primary rounded-full text-xl text-white font-semibold"
            >
              Add Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>
    <!-- Add Money Section End-->

    <!-- Cashout Section Start-->
    <section id="cashout" class="">
      <div class="px-6 pb-10">
        <div class="">
          <h1 class="text-[18px] font-semibold text-[#080808] pb-4">
            Cash Out
          </h1>
        </div>
        <div class="">
          <fieldset
            class="fieldset bg-white border-base-300 rounded-3xl w-[402px] p-6 gap-4"
          >
            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Agent Number</label
            >
            <input
              id="agent_number"
              maxlength="11"
              minlength="11"
              type="text"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter 11 digit number"
            />

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Amount</label
            >
            <input
              id="cashout_amount"
              type="number"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter amount to withdraw"
            />

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Pin Number</label
            >
            <input
              id="cashout_pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="cashout_btn"
              class="btn btn-primary rounded-full text-xl text-white font-semibold"
            >
              Withdraw Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>
    <!-- Cashout Section End-->

    <!-- Pay Bill Section Start-->
    <section id="pay_bill" class="">
      <div class="px-6 pb-10">
        <div class="">
          <h1 class="text-[18px] font-semibold text-[#080808] pb-4">
            Pay Bill
          </h1>
        </div>
        <div class="">
          <fieldset
            class="fieldset bg-white border-base-300 rounded-3xl w-[402px] p-6 gap-4"
          >
            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Select To Pay</label
            >
            <select
              id="select_pay_biller"
              class="select text-[16px] font-light text-[#080808]/50 rounded-full px-5 bg-[#F4F5F7] border-none w-full"
            >
              <option disabled selected>Select Biller</option>
              <option>WASA</option>
              <option>DESCO</option>
              <option>Amber IT</option>
            </select>

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Biller Account Number</label
            >
            <input
              id="biller_account_number"
              maxlength="11"
              minlength="11"
              type="text"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter account number"
            />

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Amount to Pay</label
            >
            <input
              id="pay_bill_amount"
              type="number"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Add Amount to pay"
            />

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Pin Number</label
            >
            <input
              id="pay_bill_pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="add_bill_btn"
              class="btn btn-primary rounded-full text-xl text-white font-semibold"
            >
              Pay Now
            </button>
          </fieldset>
        </div>
      </div>
    </section>
    <!-- Pay Bill Section End-->

    <!-- Transfer Money Section Start-->
    <section id="transfer_money" class="">
      <div class="px-6 pb-10">
        <div class="">
          <h1 class="text-[18px] font-semibold text-[#080808] pb-4">
            Transfer Money
          </h1>
        </div>
        <div class="">
          <fieldset
            class="fieldset bg-white border-base-300 rounded-3xl w-[402px] p-6 gap-4"
          >
            <label class="label text-[16px] font-medium text-[#080808]/70"
              >User Account Number</label
            >
            <input
              id="user_account_number"
              maxlength="11"
              minlength="11"
              type="text"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter 11 digit number"
            />

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Amount</label
            >
            <input
              id="transfer_amount"
              type="number"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter amount to transfer"
            />

            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Pin Number</label
            >
            <input
              id="transfer_pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="transfer_btn"
              class="btn btn-primary rounded-full text-xl text-white font-semibold"
            >
              Send Now
            </button>
          </fieldset>
        </div>
      </div>
    </section>
    <!-- Transfer Money Section End-->

    <!-- Bonus Section Start-->
    <section id="bonus" class="">
      <div class="px-6 pb-10">
        <div class="">
          <h1 class="text-[18px] font-semibold text-[#080808] pb-4">
            Get Bonus
          </h1>
        </div>
        <div class="">
          <fieldset
            class="fieldset bg-white border-base-300 rounded-3xl w-[402px] p-6 gap-4"
          >
            <label class="label text-[16px] font-medium text-[#080808]/70"
              >Enter Bonus Coupon</label
            >
            <input
              id="bonus_coupon"
              maxlength="4"
              minlength="4"
              type="text"
              class="input text-[16px] font-light rounded-full py-4 px-5 bg-[#F4F5F7] border-none w-full"
              placeholder="Enter your coupon"
            />

            <button
              id="bonus_btn"
              class="btn btn-primary rounded-full text-xl text-white font-semibold"
            >
              Get Bonus
            </button>
          </fieldset>
        </div>
      </div>
    </section>
    <!-- Bonus Section End-->

    <!-- Transactions Section Start-->
    <section id="transactions_history">
      <div class="p-6 mx-auto">
        <div class="flex items-center justify-between pb-4">
          <h1 class="text-[18px] font-semibold text-[#080808]">Transactions</h1>
          <a href=""><p class="text-[14px] text-[#080808]/50">View All</p></a>
        </div>
        <div class="" id="history_container"></div>
      </div>
    </section>
    <!-- Transactions Section End-->

    <script src="./script/payBill.js"></script>
    <script src="./script/getBonus.js"></script>
    <script src="./script/transferMoney.js"></script>
    <script src="./script/machine.js"></script>
    <script src="./script/addMoney.js"></script>
    <script src="./script/cashout.js"></script>
  </body>
</html>
