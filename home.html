<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- daisyui CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Custom CSS -->
    <style>
      * {
        font-family: "Outfit", sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-screen md:max-w-md bg-base-200 mx-auto">
    <!-- TobBar Section Start-->
    <section>
      <div class="flex justify-between py-4 px-6">
        <div class="">
          <h1>00:00</h1>
        </div>
        <div class="">
          <i class="fa-solid fa-signal"></i>
          <i class="fa-solid fa-wifi"></i>
          <i class="fa-solid fa-battery-full"></i>
        </div>
      </div>
    </section>
    <!-- Topbar Section End-->

    <!-- Header Section Start -->
    <section class="border-b border-[#080808]/10">
      <div class="flex justify-between py-2.5 px-6">
        <div class="flex gap-2">
          <div class="w-[60px]">
            <img src="/assets/logo.png" alt="" />
          </div>
          <div class="gap-1.5">
            <h1 class="text-[18px] font-extrabold text-[#080808]">
              $<span id="balance">45000</span>
            </h1>
            <p class="text-[14px] text-[#080808] opacity-50">
              Available Balance
            </p>
          </div>
        </div>
        <div class="">
          <a href="/index.html">
            <button class="btn">
              <i class="rotate-180 fa-solid fa-arrow-right-from-bracket"></i>
              Logout
            </button>
          </a>
        </div>
      </div>
    </section>
    <!-- Header Section End-->

    <!-- Banner Section Start-->
    <section>
      <div class="px-6 pt-8 pb-6">
        <h1 class="text-2xl font-bold leading-8 text-[#080808] pb-3">
          Welcome to Pay<span class="text-[#7460FF]">oo</span>
        </h1>
        <p class="leading-7 text-[#080808] opacity-50">
          Enjoy easy and convenient financial services with us. Cashout charge
          is low and
        </p>
      </div>
    </section>
    <!-- Banner Section End-->

    <!-- Card Section Start-->
    <section>
      <div class="p-6 grid grid-cols-3 gap-4">
        <button
          class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2] focus:bg-[#0874F2]/5 focus:border focus:border-[#0874F2]"
        >
          <img src="/assets/opt-1.png" alt="" />
          <p>Add Money</p>
        </button>
        <button
          class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
        >
          <img src="/assets/opt-2.png" alt="" />
          <p>Cash Out</p>
        </button>
        <button
          class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
        >
          <img src="/assets/opt-3.png" alt="" />
          <p>Pay Bill</p>
        </button>
        <button
          class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
        >
          <img src="/assets/opt-4.png" alt="" />
          <p>Transfer Money</p>
        </button>
        <button
          class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
        >
          <img src="/assets/opt-5.png" alt="" />
          <p>Get Bonus</p>
        </button>
        <button
          class="btn flex-col h-full py-5 px-[26px] gap-2 bg-white rounded-xl hover:bg-[#0874F2]/5 hover:border hover:border-[#0874F2]"
        >
          <img src="/assets/opt-6.png" alt="" />
          <p>Transactions</p>
        </button>
      </div>
    </section>
    <!-- Card Section End-->
  </body>
</html>
